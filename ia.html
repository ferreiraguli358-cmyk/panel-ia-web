<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA CORE - PANEL NÚCLEO</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #consola { background: #050505; border: 1px solid #0f0; height: 450px; overflow-y: auto; padding: 15px; margin-bottom: 15px; border-radius: 5px; color: #0f0; box-shadow: inset 0 0 15px #003300; }
        .controles { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #111; border: 1px solid #0f0; color: #0f0; border-radius: 5px; outline: none; }
        button { padding: 12px 25px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #fff; }
        .user-cmd { color: #00ffff; font-weight: bold; margin-top: 10px; display: block; }
        .ia-res { color: #ffffff; margin-bottom: 15px; display: block; border-left: 2px solid #0f0; padding-left: 10px; }
    </style>
</head>
<body>
    <h2>NÚCLEO DE INTELIGENCIA ARTIFICIAL V1.0</h2>
    <div id="consola">>> SISTEMA ONLINE. ESPERANDO ÓRDENES...</div>
    <div class="controles">
        <input type="text" id="comando" placeholder="Escribir comando..." autocomplete="off">
        <button onclick="enviarIA()">EJECUTAR</button>
    </div>

    <script>
        const API_KEY = "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"; 

        async function enviarIA() {
            const prompt = document.getElementById('comando').value;
            const log = document.getElementById('consola');
            if(!prompt) return;

            log.innerHTML += `<span class="user-cmd">> ${prompt}</span>`;
            document.getElementById('comando').value = "";
            const loadingId = "L-" + Date.now();
            log.innerHTML += `<span id="${loadingId}" style="color:yellow">IA: Procesando...</span>`;
            log.scrollTop = log.scrollHeight;

            try {
                // Usamos un Proxy que no requiere activación manual
                const url = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.groq.com/openai/v1/chat/completions");

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: prompt}]
                    })
                });

                if (!response.ok) throw new Error("Error en red");

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                const respuestaIA = data.choices[0].message.content;
                log.innerHTML += `<span class="ia-res">IA: ${respuestaIA}</span>`;
            } catch (error) {
                if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
                log.innerHTML += `<br><span style="color:red">ERROR: El navegador bloqueó la respuesta. Saltando al Plan APK...</span>`;
                console.error(error);
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
