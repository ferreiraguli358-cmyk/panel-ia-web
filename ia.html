<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA CORE - PANEL</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #consola { background: #050505; border: 1px solid #0f0; height: 450px; overflow-y: auto; padding: 15px; margin-bottom: 15px; border-radius: 5px; color: #0f0; box-shadow: inset 0 0 10px #003300; }
        .controles { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #111; border: 1px solid #0f0; color: #0f0; border-radius: 5px; outline: none; }
        button { padding: 12px 25px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        button:hover { background: #00cc00; }
        .user-cmd { color: #00ffff; font-weight: bold; }
        .ia-res { color: #ffffff; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <h2>NÚCLEO DE INTELIGENCIA ARTIFICIAL V1.0</h2>
    <div id="consola">>> SISTEMA ONLINE. ESPERANDO ÓRDENES...</div>
    <div class="controles">
        <input type="text" id="comando" placeholder="Escribir comando al núcleo..." onkeypress="if(event.key==='Enter') enviarIA()">
        <button onclick="enviarIA()">EJECUTAR</button>
    </div>

    <script>
        // TU KEY DE GROQ
        const API_KEY = "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"; 

        async function enviarIA() {
            const prompt = document.getElementById('comando').value;
            const log = document.getElementById('consola');
            if(!prompt) return;

            log.innerHTML += `<br><span class="user-cmd">> ${prompt}</span>`;
            document.getElementById('comando').value = "";
            log.innerHTML += `<br><span id="cargando" style="color:yellow">IA: Pensando...</span>`;
            log.scrollTop = log.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192", // Modelo rápido de Groq
                        messages: [{role: "user", content: prompt}]
                    })
                });

                const data = await response.json();
                const tempMsg = document.getElementById('cargando');
                if(tempMsg) tempMsg.remove();

                const respuestaIA = data.choices[0].message.content;
                log.innerHTML += `<br><span class="ia-res">IA: ${respuestaIA}</span>`;
            } catch (error) {
                const tempMsg = document.getElementById('cargando');
                if(tempMsg) tempMsg.remove();
                log.innerHTML += `<br><span style="color:red">ERROR: Fallo en la conexión con el núcleo.</span>`;
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
