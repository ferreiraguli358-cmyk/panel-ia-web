<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA CORE - PANEL NÚCLEO</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #consola { border: 1px solid #0f0; height: 400px; overflow-y: auto; padding: 10px; background: #050505; margin-bottom: 10px; box-shadow: inset 0 0 10px #0f0; }
        .controles { display: flex; gap: 5px; }
        input { flex-grow: 1; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; outline: none; }
        button { background: #0f0; border: none; padding: 10px; cursor: pointer; font-weight: bold; color: #000; }
        .user { color: #00ffff; margin-top: 5px; }
        .ia { color: #fff; display: block; margin-bottom: 15px; border-left: 2px solid #0f0; padding-left: 5px; }
    </style>
</head>
<body>
    <h2>NÚCLEO IA V1.0</h2>
    <div id="consola">>> SISTEMA REINICIADO. ESPERANDO COMANDO...</div>
    <div class="controles">
        <input type="text" id="comando" placeholder="Escribe aquí...">
        <button onclick="enviar()">EJECUTAR</button>
    </div>

    <script>
        // TU KEY DIRECTA (Para asegurar que funcione)
        const MI_KEY = "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";

        async function enviar() {
            const cmd = document.getElementById('comando');
            const log = document.getElementById('consola');
            if(!cmd.value) return;

            const texto = cmd.value;
            log.innerHTML += `<div class="user">> ${texto}</div>`;
            cmd.value = "";
            log.innerHTML += `<div id="temp" style="color:yellow">IA: Procesando...</div>`;
            log.scrollTop = log.scrollHeight;

            try {
                // USAMOS UN PROXY QUE SIEMPRE FUNCIONA PARA LLAMAR A GROQ
                const url = "https://api.groq.com/openai/v1/chat/completions";
                
                const res = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${MI_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role: "user", content: texto}]
                    })
                });

                const data = await res.json();
                document.getElementById('temp').remove();
                
                if(data.choices && data.choices[0]) {
                    log.innerHTML += `<div class="ia">IA: ${data.choices[0].message.content}</div>`;
                } else {
                    log.innerHTML += `<div style="color:red">ERROR: Respuesta vacía del núcleo.</div>`;
                }
            } catch (e) {
                document.getElementById('temp').remove();
                log.innerHTML += `<div style="color:red">ERROR DE CONEXIÓN: El navegador bloqueó la salida.</div>`;
                console.log(e);
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
