<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA CORE - PANEL</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        #consola { background: #111; border: 1px solid #333; height: 400px; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 5px; color: #00ff00; }
        input { width: 80%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { padding: 12px; background: #00ff00; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>NÚCLEO DE INTELIGENCIA ARTIFICIAL</h2>
    <div id="consola">>> Sistema listo. Esperando comandos...</div>
    <input type="text" id="comando" placeholder="Escribe tu orden a la IA...">
    <button onclick="enviarIA()">EJECUTAR</button>

    <script>
        async function enviarIA() {
            const cmd = document.getElementById('comando').value;
            const log = document.getElementById('consola');
            log.innerHTML += "<br>> " + cmd;
            
            // Aquí conectaremos tu API KEY en el siguiente paso
            log.innerHTML += "<br><span style='color:white'>IA: Procesando con API Key...</span>";
            document.getElementById('comando').value = "";
        }
    </script>
</body>
</html>
